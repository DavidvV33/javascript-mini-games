<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Games</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Nunito', sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 4rem 2rem;
        color: #eee;
      }

      h1 {
        font-size: 4rem;
        font-weight: 700;
        letter-spacing: 2px;
        margin-bottom: 1rem;
        text-align: center;
        text-shadow: 0 0 30px rgba(255,255,255,0.2);
      }

      .subtitle {
        font-size: 1.4rem;
        color: rgba(255,255,255,0.5);
        margin-bottom: 5rem;
        text-align: center;
      }

      .games-grid {
        display: flex;
        gap: 3rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .game-card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px;
        padding: 3rem;
        width: 28rem;
        text-align: center;
        text-decoration: none;
        color: #eee;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
      }

      .game-card:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: translateY(-6px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        border-color: rgba(255,255,255,0.25);
      }

      .game-icon {
        font-size: 5rem;
        margin-bottom: 1.5rem;
        display: block;
      }

      .game-title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 1rem;
      }

      .game-desc {
        font-size: 1.3rem;
        color: rgba(255,255,255,0.6);
        line-height: 1.6;
      }

      .play-btn {
        display: inline-block;
        margin-top: 2rem;
        padding: 0.8rem 2.5rem;
        background: rgba(255,255,255,0.9);
        color: #222;
        border-radius: 50px;
        font-size: 1.3rem;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: background 0.2s;
      }

      .game-card:hover .play-btn {
        background: #fff;
      }

      footer {
        margin-top: 6rem;
        font-size: 1.2rem;
        color: rgba(255,255,255,0.3);
      }
    </style>
  </head>
  <body>
    <h1>🎮 Mini Games</h1>
    <p class="subtitle">Pick a game and start playing!</p>

    <div class="games-grid">
      <a href="crack-the-safe/index.html" class="game-card">
        <span class="game-icon">🔐</span>
        <h2 class="game-title">Crack the Safe</h2>
        <p class="game-desc">Guess the secret number between 1 and 50. You have 50 points — use them wisely!</p>
        <span class="play-btn">Play →</span>
      </a>

      <a href="pig-game/index.html" class="game-card">
        <span class="game-icon">🐷</span>
        <h2 class="game-title">Pig Game</h2>
        <p class="game-desc">Roll the dice and accumulate points. But watch out — roll a 1 and you lose your turn!</p>
        <span class="play-btn">Play →</span>
      </a>
    </div>

    <footer>Built with vanilla JavaScript &amp; CSS</footer>
  </body>
</html>
